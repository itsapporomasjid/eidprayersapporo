<!DOCTYPE html>
<html>
<head>
<title>Eid Prayer Registration</title>
<style>

body{
font-family:Arial;
max-width:600px;
margin:auto;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#2c7a7b;
color:white;
padding:12px;
border:none;
}

</style>
</head>

<body>

<h2>Eid Al-Fitr Prayer Registration</h2>

<form id="eidForm">

<label>Full Name</label>
<input name="name" required>

<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone</label>
<input name="phone">

<label>Are you bringing children?</label>
<select name="children">
<option>No</option>
<option>Yes</option>
</select>

<label>Children Gender</label>
<select name="children_gender">
<option>None</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Preferred Batch</label>
<select name="batch">
<option value="6">6:00</option>
<option value="7">7:00</option>
<option value="8">8:00</option>
<option value="9">9:00</option>
<option value="10">10:00</option>
</select>

<br><br>

<label>
<input type="checkbox" required>
Registration must be completed 1 day before Eid prayer
</label>

<br>

<label>
<input type="checkbox" required>
I will attend according to the schedule stated in the email
</label>

<br><br>

<button type="submit" id="submitBtn">Register</button>

</form>

<script>

document.getElementById("eidForm").addEventListener("submit", function(e){

e.preventDefault();
document.getElementById("submitBtn").disabled = true;
document.getElementById("submitBtn").innerText = "Processing...";
fetch("https://script.google.com/macros/s/AKfycbwBIBMpbzwQe-lgDVL-ZkDaMU1hlDzN4yjrI1M3t-nwOvOBnEHQKmXbhfgiL6xvuvjMmQ/exec",{
method:"POST",
body:new FormData(this)
})
.then(res => res.json())
.then(data => {

if(data.status=="OK"){

document.body.innerHTML = `
<h2>Eid Prayer Ticket</h2>
<h3>Your Batch: ${data.batch}:00</h3>
<img src="https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=${data.qr}">
<p>Please show this ticket at the entrance.</p>
`;

}else{

alert("Registration full");

}

})
.catch(err => {
alert("Registration failed. Please try again.");
console.error(err);
});

});

</script>

</body>
</html>
