<!DOCTYPE html>
<html>
<head>
<title>Eid Prayer Registration</title>

<style>

body{
font-family:Arial;
max-width:600px;
margin:auto;
padding:20px;
}

label{
display:block;
margin-top:12px;
}

input,select{
width:100%;
padding:10px;
margin-top:4px;
box-sizing:border-box;
}

button{
background:#2c7a7b;
color:white;
padding:12px;
border:none;
width:100%;
margin-top:20px;
cursor:pointer;
}

#seatStatus{
background:#f4f4f4;
padding:10px;
margin-bottom:20px;
}

#totalSeats{
background:#e9ecef;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Eid Al-Fitr Prayer Registration</h2>

<h3>Seat Availability</h3>
<div id="seatStatus">Loading...</div>

<form id="eidForm">

<label>Full Name</label>
<input name="name" required>

<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone</label>
<input name="phone">

<label>Number of Boys</label>
<input type="number" name="boys_count" min="0" value="0">

<label>Number of Girls</label>
<input type="number" name="girls_count" min="0" value="0">

<label>Total Seats Reserved</label>
<input type="text" id="totalSeats" value="1 seat (1 adult)" readonly>

<label>Preferred Batch</label>
<select name="batch"></select>

<br><br>

<label>
<input type="checkbox" required>
Registration must be completed 1 day before Eid prayer
</label>

<br>

<label>
<input type="checkbox" required>
I will attend according to the schedule stated in the email
</label>

<br><br>

<button type="submit" id="submitBtn">Register</button>

</form>

<script>

const api="https://script.google.com/macros/s/AKfycbwaq-wvM3_KiO5AjvPROaTMh9OMy7ZckWvEduR9evtJ7w9e4BRzfhXuZ4XJc4ETR7Frxg/exec"


function updateTotalSeats(){

let boys=parseInt(document.querySelector("[name=boys_count]").value)||0
let girls=parseInt(document.querySelector("[name=girls_count]").value)||0

let total=1+boys+girls

document.getElementById("totalSeats").value =
`${total} seat(s) (1 adult + ${boys+girls} children)`

}

document.querySelector("[name=boys_count]").addEventListener("input",updateTotalSeats)
document.querySelector("[name=girls_count]").addEventListener("input",updateTotalSeats)

updateTotalSeats()



function loadSeats(){

fetch(api)
.then(res=>res.json())
.then(data=>{

let html=""
let dropdown=document.querySelector("select[name=batch]")

dropdown.innerHTML=""

for(let b=6;b<=10;b++){

let m=data[b].maleLeft
let f=data[b].femaleLeft

let isFull=(m<=0 && f<=0)

html+=`
<div>
<b>${b}:00</b>
Male left: ${m}/300 | Female left: ${f}/100 ${isFull?"<b>FULL</b>":""}
</div>
`

let option=document.createElement("option")

option.value=b

if(isFull){
option.text=`${b}:00 (FULL)`
option.disabled=true
}else{
option.text=`${b}:00 (M:${m} F:${f})`
}

dropdown.appendChild(option)

}

document.getElementById("seatStatus").innerHTML=html

})

}

loadSeats()

setInterval(loadSeats,5000)



document.getElementById("eidForm").addEventListener("submit",function(e){

e.preventDefault()

let boys=parseInt(document.querySelector("[name=boys_count]").value)||0
let girls=parseInt(document.querySelector("[name=girls_count]").value)||0

if(boys<0 || girls<0){
alert("Children numbers cannot be negative")
return
}

document.getElementById("submitBtn").disabled=true
document.getElementById("submitBtn").innerText="Processing..."

fetch(api,{
method:"POST",
body:new FormData(this)
})
.then(res=>res.json())
.then(data=>{

if(data.status=="OK"){

document.body.innerHTML=`
<h2>Eid Prayer Ticket</h2>
<h3>Your Batch: ${data.batch}:00</h3>
<img src="https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=${data.qr}">
<p>Please show this ticket at the entrance.</p>
`

}else{

alert("Registration full")

}

})
.catch(err=>{
alert("Registration failed")
console.error(err)
})

})

</script>

</body>
</html>
