<!DOCTYPE html>
<html>
<head>

<title>Sapporo Masjid Eid Al-Fitr Prayer Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/png" href="images/his-logo.png">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
font-family:Arial, Helvetica, sans-serif;
background:#F7F9F8;
margin:0;
padding:20px;
color:#2C2C2C;
}

.container{
max-width:650px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.header{text-align:center;margin-bottom:25px;}
.logo{width:120px;margin-bottom:10px;}

.header h1{margin:0;font-size:28px;color:#1F6F5C;}
.header p{margin:5px 0 0 0;font-size:14px;color:#666;}

label{display:block;margin-top:14px;font-weight:600;}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
}

button{
background:#1F6F5C;
color:white;
padding:14px;
border:none;
width:100%;
margin-top:20px;
border-radius:6px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{background:#175a4a;}

#seatStatus{
background:#f2f6f5;
padding:15px;
border-radius:8px;
margin-bottom:20px;
font-size:14px;
}

.progressBar{
width:100%;height:12px;background:#e0e0e0;
border-radius:6px;margin:6px 0;overflow:hidden;
}

.progressFill{height:100%;background:#1F6F5C;}

#totalSeats{background:#f0f0f0;font-weight:bold;}

#ticket{
max-width:420px;margin:auto;border:2px dashed #1F6F5C;
border-radius:12px;padding:25px;text-align:center;background:white;
}

footer{margin-top:30px;text-align:center;font-size:12px;color:#888;}
</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="images/his-logo.png" class="logo">
<h1>Sapporo Masjid</h1>
<p>Eid Al-Fitr Prayer Registration</p>
</div>

<h3>Seat Availability</h3>
<div id="seatStatus">Loading...</div>

<form id="eidForm">

<label>Full Name</label>
<input name="name" required>

<label>Gender</label>
<select name="gender" required>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<label>Email</label>
<input type="email" name="email">

<label>Phone</label>
<input name="phone">

<label>Number of Boys</label>
<input type="number" name="boys_count" min="0" value="0">

<label>Number of Girls</label>
<input type="number" name="girls_count" min="0" value="0">

<label>Wife</label>
<input type="number" name="wife_count" min="0" value="0">

<label>Total Seats Reserved</label>
<input type="text" id="totalSeats" readonly>

<label>Preferred Batch</label>
<select name="batch" required></select>

<label>
<input type="checkbox" required>
I will attend according to the schedule stated in the ticket
</label>

<button type="submit" id="submitBtn">Register</button>

</form>

<footer>Organized by Hokkaido Islamic Society</footer>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbxyQxg3bSQcDM1wbtFVdsmCo1elc9oMrnkgaQCaEAC_hlW__VdVlw7MrbFbbp_6c4VE_A/exec"

/* ============================= */
/* TOTAL SEAT CALCULATION */
/* ============================= */

function updateTotalSeats(){

let boys=parseInt(document.querySelector("[name=boys_count]").value)||0
let girls=parseInt(document.querySelector("[name=girls_count]").value)||0
let wife=parseInt(document.querySelector("[name=wife_count]").value)||0

let total=1+boys+girls+wife

document.getElementById("totalSeats").value =
`${total} seat(s) (1 adult + ${boys+girls+wife} family members)`

}

["boys_count","girls_count","wife_count"].forEach(n=>{
document.querySelector(`[name=${n}]`).addEventListener("input",updateTotalSeats)
})

updateTotalSeats()

/* ============================= */
/* PROGRESS BAR */
/* ============================= */

function progress(percent){
return `<div class="progressBar"><div class="progressFill" style="width:${percent}%"></div></div>`
}

/* ============================= */
/* LOAD SEATS */
/* ============================= */

function loadSeats(){

fetch(api)
.then(res=>res.json())
.then(data=>{

let html=""
let dropdown=document.querySelector("select[name=batch]")
let selectedBatch = dropdown.value

dropdown.innerHTML=""

const batches=[6,7,8,9,10]

batches.forEach((b)=>{

// SAFE ACCESS
let m = data[b]?.maleCount || 0
let f = data[b]?.femaleCount || 0
let maleLimit = data[b]?.maleLimit || 300
let femaleLimit = data[b]?.femaleLimit || 100

let percent = Math.round(((m+f)/(maleLimit+femaleLimit))*100)
percent = Math.min(100, Math.max(0, percent))

let isFull = (m>=maleLimit && f>=femaleLimit)

html+=`<div style="margin-bottom:10px;">
<b>${b}:00 a.m.</b> ${percent}% full
${progress(percent)}
Male: ${m}/${maleLimit} | Female: ${f}/${femaleLimit}
</div>`

let option=document.createElement("option")
option.value=b

option.text = isFull
? `${b}:00 a.m. (FULL)`
: `${b}:00 a.m. (M:${m} F:${f})`

option.disabled = isFull

dropdown.appendChild(option)

})

if(selectedBatch){
dropdown.value = selectedBatch
}

document.getElementById("seatStatus").innerHTML=html

})
.catch(()=>{
document.getElementById("seatStatus").innerHTML="Error loading data"
})

}

loadSeats()
setInterval(loadSeats,5000)

/* ============================= */
/* FORM SUBMIT */
/* ============================= */

document.getElementById("eidForm").addEventListener("submit",function(e){

e.preventDefault()

// EXTRA FRONTEND VALIDATION
let gender = document.querySelector("[name=gender]").value
if(gender !== "Male" && gender !== "Female"){
alert("Invalid gender selection")
return
}

let boys=parseInt(document.querySelector("[name=boys_count]").value)||0
let girls=parseInt(document.querySelector("[name=girls_count]").value)||0
let wife=parseInt(document.querySelector("[name=wife_count]").value)||0

document.getElementById("submitBtn").disabled=true
document.getElementById("submitBtn").innerText="Processing..."

fetch(api,{
method:"POST",
body:new FormData(this)
})
.then(res=>res.json())
.then(data=>{

if(data.status=="OK"){

let name=document.querySelector('[name=name]').value
let seats=1+boys+girls+wife

let qrData=`Sapporo Masjid Eid Prayer
Name:${name}
Batch:${data.batch}:00 a.m.
Seats:${seats}
Ticket:${data.qr}`

document.body.innerHTML=`

<div id="ticket">
<h2>Sapporo Masjid</h2>
<h3>Eid Al-Fitr Prayer</h3>
<hr>
<h2>Batch ${data.batch}:00 a.m.</h2>
<p><strong>${name}</strong></p>
<p>Seats Reserved: ${seats}</p>

<img crossorigin="anonymous"
src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrData)}">

<p>Please show this ticket at the entrance.</p>
</div>

<button onclick="downloadTicket()">Download Ticket</button>
`

}else{
alert("Registration full or invalid data")
document.getElementById("submitBtn").disabled=false
document.getElementById("submitBtn").innerText="Register"
}

})

})

/* ============================= */
/* DOWNLOAD TICKET */
/* ============================= */

function downloadTicket(){

html2canvas(document.querySelector("#ticket"),{
useCORS:true,
scale:3
}).then(canvas=>{
let link=document.createElement("a")
link.download="eid-ticket.png"
link.href=canvas.toDataURL("image/png")
link.click()
})

}

</script>

</body>
</html>
