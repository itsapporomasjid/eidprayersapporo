<!DOCTYPE html>
<html>
<head>

  <link rel="icon" type="image/png" href="images/his-logo.png">

  
<title>Eid Ticket Scanner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
background:#f5f5f5;
}

h2{
margin-bottom:10px;
}

#reader{
width:100%;
max-width:500px;
margin:auto;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
padding:15px;
border-radius:8px;
}

.ok{
background:#d4edda;
color:#155724;
}

.used{
background:#fff3cd;
color:#856404;
}

.error{
background:#f8d7da;
color:#721c24;
}

</style>

</head>

<body>

<h2>Eid Prayer Ticket Scanner</h2>

<div id="reader"></div>

<div id="result">Ready to scan ticket</div>

<script>

const api="https://script.google.com/macros/s/AKfycbyN6hUC2fmxk7s7GL9oL6NWpw_Hbnon5sQ8XiBuo1k54DvqSZu16pL3cw1StfyH2X33dA/exec"

let scanner

function onScanSuccess(qrText){

scanner.pause(true)

let ticket=null
let lines=qrText.split("\n")

for(let i=0;i<lines.length;i++){
if(lines[i].startsWith("Ticket:")){
ticket=lines[i].replace("Ticket:","").trim()
}
}

if(!ticket){
showResult("Invalid QR","error")
resumeScanner()
return
}

fetch(api+"?qr="+encodeURIComponent(ticket))
.then(r=>r.json())
.then(data=>{

if(data.status=="OK"){
showResult(`✅ VALID<br>${data.name}<br>Batch ${data.batch}:00<br>Seats: ${data.seats}`,"ok")
}

else if(data.status=="USED"){
showResult("⚠️ Ticket Already Used","used")
}

else{
showResult("❌ Ticket Not Found","error")
}

resumeScanner()

})

}

function showResult(message,type){

let box=document.getElementById("result")

box.innerHTML=message
box.className=type

}

function resumeScanner(){

setTimeout(()=>{
scanner.resume()
document.getElementById("result").innerHTML="Ready to scan ticket"
document.getElementById("result").className=""
},3000)

}

window.onload=function(){

scanner=new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:{width:300,height:300}
}
)

scanner.render(onScanSuccess)

}

</script>

</body>
</html>
