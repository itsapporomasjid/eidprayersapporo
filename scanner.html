<!DOCTYPE html>
<html>
<head>

  <link rel="icon" type="image/png" href="images/his-logo.png">

  <div class="header">

<img src="images/his-logo.png" class="logo">

<h1>Sapporo Masjid</h1>

<p>Eid Al-Fitr Prayer Registration</p>

</div>
  
<title>Eid Ticket Scanner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#F7F9F8;
margin:0;
padding:20px;
color:#2C2C2C;
}

.container{
max-width:650px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.header{
text-align:center;
margin-bottom:25px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.header h1{
margin:0;
font-size:28px;
color:#1F6F5C;
}

.header p{
margin:5px 0 0 0;
font-size:14px;
color:#666;
}

label{
display:block;
margin-top:14px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
}

button{
background:#1F6F5C;
color:white;
padding:14px;
border:none;
width:100%;
margin-top:20px;
border-radius:6px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#175a4a;
}

#seatStatus{
background:#f2f6f5;
padding:15px;
border-radius:8px;
margin-bottom:20px;
font-size:14px;
}

#totalSeats{
background:#f0f0f0;
font-weight:bold;
}

#ticket{
max-width:420px;
margin:auto;
border:2px dashed #1F6F5C;
border-radius:12px;
padding:25px;
text-align:center;
background:white;
}

#ticket h2{
color:#1F6F5C;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
padding:15px;
border-radius:8px;
}

.ok{
background:#d4edda;
color:#155724;
}

.used{
background:#fff3cd;
color:#856404;
}

.error{
background:#f8d7da;
color:#721c24;
}

</style>

</head>

<body>

<h2>Eid Prayer Ticket Scanner</h2>

<div id="reader"></div>

<div id="result">Ready to scan ticket</div>

<script>

const api="https://script.google.com/macros/s/AKfycbyN6hUC2fmxk7s7GL9oL6NWpw_Hbnon5sQ8XiBuo1k54DvqSZu16pL3cw1StfyH2X33dA/exec"

let scanner

function onScanSuccess(qrText){

scanner.pause(true)

let ticket=null
let lines=qrText.split("\n")

for(let i=0;i<lines.length;i++){
if(lines[i].startsWith("Ticket:")){
ticket=lines[i].replace("Ticket:","").trim()
}
}

if(!ticket){
showResult("Invalid QR","error")
resumeScanner()
return
}

fetch(api+"?qr="+encodeURIComponent(ticket))
.then(r=>r.json())
.then(data=>{

if(data.status=="OK"){
showResult(`✅ VALID<br>${data.name}<br>Batch ${data.batch}:00<br>Seats: ${data.seats}`,"ok")
}

else if(data.status=="USED"){
showResult("⚠️ Ticket Already Used","used")
}

else{
showResult("❌ Ticket Not Found","error")
}

resumeScanner()

})

}

function showResult(message,type){

let box=document.getElementById("result")

box.innerHTML=message
box.className=type

}

function resumeScanner(){

setTimeout(()=>{
scanner.resume()
document.getElementById("result").innerHTML="Ready to scan ticket"
document.getElementById("result").className=""
},3000)

}

window.onload=function(){

scanner=new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:{width:300,height:300}
}
)

scanner.render(onScanSuccess)

}

</script>

</body>
</html>
